<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompostTrack — Statistiques</title>
  <meta name="theme-color" content="#1b4332">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header__logo">🌿 CompostTrack</div>
  <nav class="header__nav" id="main-nav" style="display:none">
    <a href="index.html">🗺️ <span class="nav-text">Carte</span></a>
    <a href="bacs.html">📦 <span class="nav-text">Bacs</span></a>
    <a href="stats.html" class="active">📊 <span class="nav-text">Stats</span></a>
  </nav>
  <div id="auth-login" style="display:flex">
    <div id="google-signin-btn"></div>
  </div>
  <div id="auth-user" style="display:none" class="header__user">
    <img id="user-avatar" class="header__avatar" src="" alt="Avatar" style="display:none">
    <span id="user-name" class="header__username"></span>
    <button class="header__logout" onclick="Auth.logout()">Déconnexion</button>
  </div>
</header>

<!-- Écran de connexion -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-screen__icon">📊</div>
  <h1 class="auth-screen__title">CompostTrack</h1>
  <p class="auth-screen__subtitle">Connectez-vous avec votre compte Google autorisé.</p>
  <div id="google-signin-btn-center" style="margin-top:1.5rem"></div>
</div>

<!-- Contenu principal -->
<div id="app-content" style="display:none">
<div class="stats-page">

  <div class="stats-header">
    <h1 class="stats-page-title">📊 Statistiques</h1>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
      <select id="stats-periode" class="stats-periode-select">
        <option value="semaine">Par semaine</option>
        <option value="mois" selected>Par mois</option>
        <option value="annee">Par année</option>
      </select>
      <button class="btn btn--export" onclick="ExportModule.openExportModal()">📥 Excel</button>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card"><div class="kpi-card__value" id="kpi-total-bacs">—</div><div class="kpi-card__label">Bacs</div></div>
    <div class="kpi-card"><div class="kpi-card__value" id="kpi-total-releves">—</div><div class="kpi-card__label">Relevés</div></div>
    <div class="kpi-card"><div class="kpi-card__value" id="kpi-moy-apport">—</div><div class="kpi-card__label">Apport moy.</div></div>
    <div class="kpi-card"><div class="kpi-card__value" id="kpi-moy-broyat">—</div><div class="kpi-card__label">Broyat moy.</div></div>
    <div class="kpi-card"><div class="kpi-card__value" id="kpi-moy-temp">—</div><div class="kpi-card__label">Temp. moy.</div></div>
    <div class="kpi-card"><div class="kpi-card__value" id="kpi-moy-qualite">—</div><div class="kpi-card__label">Note moy.</div></div>
  </div>

  <!-- Filtre sites -->
  <div class="stats-controls">
    <div class="stats-controls__title">Sites affichés</div>
    <div id="stats-sites" class="stats-sites-grid"></div>
  </div>

  <!-- Graphiques -->
  <div class="charts-grid">
    <div class="chart-card chart-card--full"><canvas id="chart-remplissage"></canvas></div>
    <div class="chart-card"><canvas id="chart-temperature"></canvas></div>
    <div class="chart-card"><canvas id="chart-qualite"></canvas></div>
    <div class="chart-card"><canvas id="chart-problemes"></canvas></div>
    <div class="chart-card"><canvas id="chart-activite"></canvas></div>
  </div>

</div>
</div><!-- /#app-content -->


<!-- MODALE Export -->
<div id="modal-export" class="modal" role="dialog" aria-modal="true">
  <div class="modal__box">
    <div class="modal__header">
      <h2 class="modal__title">📥 Exporter les relevés</h2>
      <button class="modal__close" data-close-modal="modal-export">×</button>
    </div>
    <p class="export-info">Export <strong>.xlsx</strong> avec toutes les données.</p>
    <p class="export-section-title">📅 Période</p>
    <div class="form__row" style="margin-bottom:.95rem">
      <div class="form__group">
        <label class="form__label">Du</label>
        <input type="date" id="export-date-debut" class="form__input">
      </div>
      <div class="form__group">
        <label class="form__label">Au</label>
        <input type="date" id="export-date-fin" class="form__input">
      </div>
    </div>
    <p class="export-section-title">🏡 Sites</p>
    <div id="export-sites" class="checkbox-group" style="margin-bottom:1rem"></div>
    <div class="form__actions">
      <button class="btn btn--secondary" data-close-modal="modal-export">Annuler</button>
      <button id="btn-export-go" class="btn btn--export" onclick="ExportModule.runExport()">📥 Télécharger</button>
    </div>
  </div>
</div>


<!-- SCRIPTS -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/stats.js"></script>
<script src="js/export.js"></script>

<script>
  initModalClose();

  window.addEventListener("load", () => {
    Auth.init();
    Auth.onLogin(async () => {
      try {
        await StatsModule.init();
        // KPI
        const [bacs, releves] = await Promise.all([apiFetchBacs(), apiFetchReleves()]);
        const moy = f => {
          const v = releves.map(r => parseFloat(r[f])).filter(v => !isNaN(v));
          return v.length ? (v.reduce((a,b)=>a+b,0)/v.length).toFixed(1) : "—";
        };
        const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
        set("kpi-total-bacs",    bacs.length);
        set("kpi-total-releves", releves.length);
        set("kpi-moy-apport",    moy("hauteurApport") !== "—" ? moy("hauteurApport") + "%" : "—");
        set("kpi-moy-broyat",    moy("hauteurBroyat") !== "—" ? moy("hauteurBroyat") + "%" : "—");
        set("kpi-moy-temp",      moy("temperature")   !== "—" ? moy("temperature")   + "°C" : "—");
        set("kpi-moy-qualite",   moy("qualiteCompostage") !== "—" ? moy("qualiteCompostage") + "/5" : "—");
      } catch (err) {
        console.error("Erreur stats :", err);
        showToast("Erreur de chargement : " + err.message, "error");
      }
    });
  });
</script>

</body>
</html>
